name: Sync Reference docs

# Keeps the vendored Reference docs (src/content/docs/reference) in step with the
# framework repo's `main` branch (PRD §4.2 / §7 — prevent dual-source drift).
# Runs scripts/sync-reference-docs.mjs, validates the build, then opens a PR with
# any changes. It NEVER pushes to main: the build CI + a human review gate it.

on:
  schedule:
    # Weekly, Monday 06:17 UTC — after the framework's weekend release cadence.
    # Adjust the cron to taste; off-the-hour avoids GitHub's scheduling congestion.
    - cron: '17 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-reference
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Reference from framework main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # pnpm version is pinned by package.json "packageManager" (Corepack-style).
      # Do NOT add a `version:` input — action-setup errors if both are set.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Capture local-vs-upstream body drift before the sync refreshes the local
      # files. Any comparison failure is fatal; body differences are reported.
      - name: Check upstream Reference drift
        run: node scripts/check-upstream-drift.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Reference docs from framework main
        run: node scripts/sync-reference-docs.mjs
        env:
          # Authenticates the upstream "new docs" check so a shared-runner IP
          # doesn't hit the unauthenticated rate limit. Raw doc fetches need no auth.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Validate the scripts, sidebar parity, and synced docs before proposing
      # them, so a broken upstream change fails instead of opening a red PR.
      - name: Validate checks
        run: pnpm check

      - name: Validate build
        run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Flag any zh/ docs translations their English bodies have outpaced.
      # Read-only; writes reference-drift-report.md; always exits 0.
      - name: Check translation drift
        run: node scripts/check-reference-drift.mjs

      - name: Open PR if the Reference docs changed
        id: cpr
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          # Org policy blocks the built-in GITHUB_TOKEN from creating PRs, so use
          # a repo-scoped PAT (the SYNC_PAT secret) instead. A PAT acts as a user,
          # sidestepping the org's "Actions can't create or approve PRs" restriction.
          token: ${{ secrets.SYNC_PAT }}
          add-paths: src/content/docs/reference
          branch: chore/sync-reference
          delete-branch: true
          base: main
          commit-message: 'chore(docs): sync Reference from framework main'
          title: 'chore(docs): sync Reference from framework main'
          labels: |
            docs
            automated
          body: |
            Automated sync of the vendored Reference docs from
            [`open-multi-agent/open-multi-agent@main`](https://github.com/open-multi-agent/open-multi-agent/tree/main/docs).

            - Curated front-matter (`title` + `description`) is preserved; only the
              bodies and links are refreshed.
            - The build was validated in this run before the PR was opened.
            - Sync coverage is discovered from upstream with an explicit
              exclusion set. New docs or directories fail the workflow until a
              reviewer integrates or excludes them; they are never auto-added.
            - The PR remains human-reviewed and is never auto-merged.

            Review the diff before merging. Re-run anytime via **Actions →
            Sync Reference docs → Run workflow**.

      # If the sync opened a PR, surface pre-sync upstream drift and translation
      # drift as review context. Posted by SYNC_PAT (the PR author).
      - name: Comment drift reports on the PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -s upstream-drift-report.md ]; then
            gh pr comment "$PR_NUMBER" -R "$REPO" --body-file upstream-drift-report.md
            echo "Posted upstream drift comment to PR #$PR_NUMBER."
          else
            echo "No upstream drift to report."
          fi
          if [ -s reference-drift-report.md ]; then
            gh pr comment "$PR_NUMBER" -R "$REPO" --body-file reference-drift-report.md
            echo "Posted translation drift comment to PR #$PR_NUMBER."
          else
            echo "No translation drift to report."
          fi
