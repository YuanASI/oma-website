name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `pnpm build` is the project's primary gate: it runs the build-time GitHub
      # stats fetch (with a hard-coded fallback, so API rate limits never fail CI)
      # and catches TS / import / ESM / content-collection errors.
      - run: pnpm build
