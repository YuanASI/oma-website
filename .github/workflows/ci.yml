name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # pnpm version is pinned by package.json "packageManager" (Corepack-style).
      # Do NOT add a `version:` input — action-setup errors if both are set.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # i18n key-parity gate: tsc type-checks the locale dicts against the en
      # UiDict (zh must match it key-for-key). `astro build` uses esbuild and
      # does NOT type-check, so a missing zh key would otherwise ship green and
      # render as `undefined` under /zh/. `pnpm check` catches it before build.
      - run: pnpm check

      # `pnpm build` is the project's primary gate: it runs the build-time GitHub
      # fetches (repo stats + the /examples inventory) and catches TS / import /
      # ESM / content-collection errors. GITHUB_TOKEN authenticates those fetches
      # so a shared-runner IP doesn't hit the unauthenticated rate limit; a
      # hard-coded fallback still keeps CI green if the API is ever unreachable.
      - run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
