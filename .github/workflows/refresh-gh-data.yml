name: Refresh GitHub snapshot

# Refreshes the committed GitHub snapshot the site builds against —
# src/data/gh-stats.json (stars/forks/contributors/release) and
# src/data/examples{,-source}.json (the /examples inventory and details). See
# scripts/refresh-gh-data.mjs.
#
# WHY: those numbers + the example list used to be fetched from the GitHub API at
# *build time*. On Cloudflare Pages' shared build IP a transient rate-limit/blip
# degraded the whole deploy to placeholder values, forcing repeated redeploys.
# Fetching here instead — on Actions' reliable token + IP — and committing the
# result decouples freshness from deploy: every build just reads the file.
#
# It proposes refreshed snapshots through a PR so main can remain protected. The
# PR is auto-merged after the required Build check passes; the resulting push to
# main triggers Cloudflare Pages and IndexNow normally.

on:
  schedule:
    # Every 6 hours, off-the-hour to dodge GitHub's scheduling congestion.
    - cron: '23 */6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-gh-data
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh snapshot from GitHub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # pnpm version is pinned by package.json "packageManager" (Corepack-style).
      # Do NOT add a `version:` input — action-setup errors if both are set.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The only step that talks to the GitHub API. GITHUB_TOKEN authenticates the
      # fetch (5,000/hr) so a shared-runner IP doesn't hit the 60/hr limit. On any
      # hard failure the script exits non-zero and writes nothing — the last-good
      # snapshot stays committed.
      - name: Refresh snapshot
        run: node scripts/refresh-gh-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Validate the generated snapshot contract and then build against the fresh
      # files before proposing them. No token here on purpose: validation and the
      # build consume only committed data and must pass fully offline.
      - name: Validate snapshots
        run: pnpm check

      - name: Validate build
        run: pnpm build

      - name: Open or update snapshot PR
        id: cpr
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          # A PAT is required because the organization blocks GITHUB_TOKEN from
          # creating pull requests.
          token: ${{ secrets.SYNC_PAT }}
          add-paths: |
            src/data/gh-stats.json
            src/data/examples.json
            src/data/examples-source.json
          branch: chore/refresh-gh-data
          delete-branch: true
          base: main
          commit-message: 'chore(data): refresh GitHub snapshot'
          title: 'chore(data): refresh GitHub snapshot'
          body: |
            Automated refresh of the committed GitHub statistics and the
            commit-pinned examples inventory plus detail sources. The snapshots
            were validated with `pnpm check` and `pnpm build` before this pull
            request was created or updated.

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash
