# IndexNow — submit canonical URLs to Bing / Yandex / partners (and, via Bing's
# index, ChatGPT search / Copilot). ENABLED: auto-submits the sitemap on every
# push to main. Also runnable by hand (workflow_dispatch); a manual run is a dry
# run unless confirm_submit=true.
#
# The IndexNow key lives at public/<key>.txt (public by design — it verifies
# ownership, it is not a secret); no auth/secret is needed. To pause it again,
# remove the `push` trigger below and it reverts to manual-only.
name: IndexNow

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm_submit:
        description: 'Actually POST to IndexNow (leave false for a dry run)'
        type: boolean
        default: false

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Submit to IndexNow
        env:
          # Auto-submit on push to main; on a manual run, honor confirm_submit.
          # Passed via env (not interpolated into the shell) per injection safety.
          SUBMIT: ${{ github.event_name == 'push' || github.event.inputs.confirm_submit == 'true' }}
        run: |
          if [ "$SUBMIT" = "true" ]; then
            node scripts/submit-indexnow.mjs --submit
          else
            node scripts/submit-indexnow.mjs
          fi
