<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" fill="none">
          <rect width="1280" height="800" fill="url(#grid)" opacity="0.4"/>

          <defs>
            <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
              <path d="M 0 1 L 9 5 L 0 9 z" fill="#A09A8E"/>
            </marker>
          </defs>

          <!-- L1: Orchestrator (entry, accent) -->
          <rect x="340" y="60" width="600" height="80" rx="6" fill="#131210" stroke="#10B981" stroke-width="1.5"/>
          <text x="370" y="92" font-family="JetBrains Mono" font-size="11" fill="#10B981" letter-spacing="2">ENTRY</text>
          <text x="370" y="120" font-family="JetBrains Mono" font-size="22" fill="#F5F2EB" font-weight="500">OpenMultiAgent</text>
          <text x="920" y="92" font-family="JetBrains Mono" font-size="11" fill="#726C62" text-anchor="end">orchestrator</text>
          <text x="920" y="120" font-family="JetBrains Mono" font-size="13" fill="#A09A8E" text-anchor="end">runTeam() · runTasks() · runAgent()</text>

          <line x1="640" y1="140" x2="640" y2="180" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrow2)"/>

          <!-- L2: Team (core, bone) -->
          <rect x="420" y="180" width="440" height="80" rx="6" fill="#131210" stroke="#F5F2EB" stroke-width="1.5"/>
          <text x="450" y="212" font-family="JetBrains Mono" font-size="11" fill="#A09A8E" letter-spacing="2">COORDINATION</text>
          <text x="450" y="240" font-family="JetBrains Mono" font-size="20" fill="#F5F2EB" font-weight="500">Team</text>
          <text x="840" y="212" font-family="JetBrains Mono" font-size="11" fill="#726C62" text-anchor="end">bus · queue · memory</text>

          <line x1="540" y1="260" x2="540" y2="300" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrow2)"/>
          <line x1="740" y1="260" x2="740" y2="300" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrow2)"/>

          <!-- L3: AgentPool & TaskQueue (parallelism primitives) -->
          <rect x="420" y="300" width="200" height="80" rx="6" fill="#131210" stroke="#F5F2EB" stroke-width="1.5"/>
          <text x="440" y="328" font-family="JetBrains Mono" font-size="10" fill="#A09A8E" letter-spacing="1.5">CONCURRENCY</text>
          <text x="440" y="354" font-family="JetBrains Mono" font-size="16" fill="#F5F2EB" font-weight="500">AgentPool</text>

          <rect x="660" y="300" width="200" height="80" rx="6" fill="#131210" stroke="#F5F2EB" stroke-width="1.5"/>
          <text x="680" y="328" font-family="JetBrains Mono" font-size="10" fill="#A09A8E" letter-spacing="1.5">SCHEDULING</text>
          <text x="680" y="354" font-family="JetBrains Mono" font-size="16" fill="#F5F2EB" font-weight="500">TaskQueue</text>

          <line x1="540" y1="380" x2="540" y2="420" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrow2)"/>

          <!-- L4: Agent + LLMAdapter (left + right pair) -->
          <rect x="240" y="420" width="280" height="100" rx="6" fill="#131210" stroke="#F5F2EB" stroke-width="1.5"/>
          <text x="260" y="448" font-family="JetBrains Mono" font-size="10" fill="#A09A8E" letter-spacing="1.5">UNIT OF WORK</text>
          <text x="260" y="476" font-family="JetBrains Mono" font-size="16" fill="#F5F2EB" font-weight="500">Agent</text>
          <text x="260" y="500" font-family="JetBrains Mono" font-size="10" fill="#726C62">run · prompt · stream</text>

          <line x1="520" y1="470" x2="560" y2="470" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrow2)"/>

          <rect x="560" y="420" width="280" height="100" rx="6" fill="#131210" stroke="#A09A8E" stroke-width="1.5" stroke-dasharray="4 3"/>
          <text x="580" y="448" font-family="JetBrains Mono" font-size="10" fill="#A09A8E" letter-spacing="1.5">INTERFACE</text>
          <text x="580" y="476" font-family="JetBrains Mono" font-size="16" fill="#F5F2EB" font-weight="500">LLMAdapter</text>
          <text x="580" y="500" font-family="JetBrains Mono" font-size="10" fill="#726C62">multiple provider implementations</text>

          <line x1="380" y1="520" x2="380" y2="560" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrow2)"/>

          <!-- L5: AgentRunner + ToolRegistry (left + right pair) -->
          <rect x="240" y="560" width="280" height="100" rx="6" fill="#131210" stroke="#F5F2EB" stroke-width="1.5"/>
          <text x="260" y="588" font-family="JetBrains Mono" font-size="10" fill="#A09A8E" letter-spacing="1.5">LOOP</text>
          <text x="260" y="616" font-family="JetBrains Mono" font-size="16" fill="#F5F2EB" font-weight="500">AgentRunner</text>
          <text x="260" y="640" font-family="JetBrains Mono" font-size="10" fill="#726C62">conversation loop · tool dispatch</text>

          <line x1="520" y1="610" x2="560" y2="610" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrow2)"/>

          <rect x="560" y="560" width="280" height="100" rx="6" fill="#131210" stroke="#A09A8E" stroke-width="1.5" stroke-dasharray="4 3"/>
          <text x="580" y="588" font-family="JetBrains Mono" font-size="10" fill="#A09A8E" letter-spacing="1.5">INTERFACE</text>
          <text x="580" y="616" font-family="JetBrains Mono" font-size="16" fill="#F5F2EB" font-weight="500">ToolRegistry</text>
          <text x="580" y="640" font-family="JetBrains Mono" font-size="10" fill="#726C62">defineTool() · 6 built-in tools</text>

          <!-- footer -->
          <line x1="80" y1="710" x2="1200" y2="710" stroke="#1F1D1A" stroke-width="1"/>
          <text x="80" y="735" font-family="JetBrains Mono" font-size="11" fill="#726C62" letter-spacing="2">OPEN-MULTI-AGENT · COMPACT</text>
          <text x="1200" y="735" font-family="JetBrains Mono" font-size="11" fill="#10B981" letter-spacing="2" text-anchor="end">v1.8.0</text>
          <text x="80" y="758" font-family="JetBrains Mono" font-size="10" fill="#5A5751" letter-spacing="2">SUMMARIZED · ALL LOAD-BEARING RELATIONSHIPS PRESERVED</text>
        </svg>
