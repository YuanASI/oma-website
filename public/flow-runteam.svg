<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">

          <defs>
            <marker id="arrFlow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
              <path d="M 0 1 L 9 5 L 0 9 z" fill="#A09A8E"/>
            </marker>
            <marker id="arrFlowAcc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
              <path d="M 0 1 L 9 5 L 0 9 z" fill="#10B981"/>
            </marker>
            <pattern id="dotgrid" width="40" height="40" patternUnits="userSpaceOnUse">
              <circle cx="1" cy="1" r="1" fill="#3A3731" opacity="0.4"/>
            </pattern>
          </defs>

          <rect width="1280" height="720" fill="url(#dotgrid)"/>

          <!-- Phase headers (top band) -->
          <g font-family="JetBrains Mono, monospace" font-size="10" fill="#5A5751" letter-spacing="2">
            <text x="100" y="50">PHASE 01</text>
            <text x="320" y="50">PHASE 02</text>
            <text x="640" y="50">PHASE 03 · PARALLEL EXECUTION</text>
            <text x="1050" y="50">PHASE 04</text>
          </g>
          <g font-family="JetBrains Mono, monospace" font-size="13" fill="#F5F2EB" font-weight="500" letter-spacing="-0.5">
            <text x="100" y="74">Goal in</text>
            <text x="320" y="74">Decompose</text>
            <text x="640" y="74">Fan out + run</text>
            <text x="1050" y="74">Result out</text>
          </g>

          <!-- Phase divider verticals -->
          <g stroke="#1F1D1A" stroke-width="1" stroke-dasharray="2 5">
            <line x1="280" y1="100" x2="280" y2="660"/>
            <line x1="500" y1="100" x2="500" y2="660"/>
            <line x1="940" y1="100" x2="940" y2="660"/>
            <line x1="1020" y1="100" x2="1020" y2="660"/>
          </g>

          <!-- Time arrow at very top -->
          <line x1="100" y1="100" x2="1180" y2="100" stroke="#3A3731" stroke-width="1"/>
          <path d="M 1175 96 L 1185 100 L 1175 104 z" fill="#3A3731"/>
          <text x="1180" y="115" font-family="JetBrains Mono, monospace" font-size="9" fill="#5A5751" letter-spacing="2" text-anchor="end">TIME →</text>

          <!-- ====== PHASE 1: GOAL IN ====== -->
          <!-- Goal input box with logo -->
          <rect x="60" y="290" width="220" height="120" rx="6" fill="#0A0908" stroke="#10B981" stroke-width="1.5"/>
          <g transform="translate(80, 310) scale(0.18)">
            <path d="M 100 80 C 150 50, 240 45, 300 95 C 350 135, 355 210, 310 250 C 260 290, 170 285, 120 250 C 75 215, 60 150, 75 115 C 82 98, 90 87, 100 80 Z" fill="#F5F2EB"/>
            <ellipse cx="230" cy="148" rx="32" ry="46" fill="#10B981" transform="rotate(20 230 148)"/>
            <circle cx="295" cy="118" r="7" fill="#10B981"/>
          </g>
          <text x="150" y="330" font-family="JetBrains Mono, monospace" font-size="11" fill="#10B981" letter-spacing="2">GOAL</text>
          <text x="150" y="358" font-family="JetBrains Mono, monospace" font-size="14" fill="#F5F2EB" font-weight="500">"Build a</text>
          <text x="150" y="378" font-family="JetBrains Mono, monospace" font-size="14" fill="#F5F2EB" font-weight="500">REST API"</text>
          <text x="150" y="398" font-family="Geist, sans-serif" font-size="11" fill="#726C62" font-style="italic">runTeam(team, goal)</text>

          <!-- Arrow phase 1 → phase 2 -->
          <line x1="280" y1="350" x2="320" y2="350" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrFlowAcc)"/>

          <!-- ====== PHASE 2: DECOMPOSE ====== -->
          <!-- Decomposer / Team box -->
          <rect x="320" y="290" width="180" height="120" rx="6" fill="#F5F2EB"/>
          <text x="410" y="320" font-family="JetBrains Mono, monospace" font-size="10" fill="#3A3731" letter-spacing="1.5" text-anchor="middle">TEAM · COORDINATOR</text>
          <text x="410" y="345" font-family="JetBrains Mono, monospace" font-size="14" fill="#0A0908" font-weight="500" text-anchor="middle">decompose</text>
          <text x="410" y="362" font-family="JetBrains Mono, monospace" font-size="14" fill="#0A0908" font-weight="500" text-anchor="middle">→ Task DAG</text>
          <text x="410" y="385" font-family="Geist, sans-serif" font-size="10" fill="#726C62" font-style="italic" text-anchor="middle">4 tasks · 2 layers</text>

          <!-- Arrows phase 2 → phase 3 (one per agent track) -->
          <path d="M 500 320 L 540 320 L 540 180" fill="none" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrFlow)"/>
          <path d="M 500 340 L 540 340 L 540 280" fill="none" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrFlow)"/>
          <path d="M 500 360 L 540 360 L 540 380" fill="none" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrFlow)"/>
          <path d="M 500 380 L 540 380 L 540 480" fill="none" stroke="#A09A8E" stroke-width="1.5" marker-end="url(#arrFlow)"/>

          <!-- ====== PHASE 3: PARALLEL EXECUTION ====== -->
          <!-- Each agent gets a horizontal track -->

          <!-- Track 1: architect -->
          <text x="555" y="180" font-family="JetBrains Mono, monospace" font-size="10" fill="#A09A8E" letter-spacing="1.5">AGENT · architect</text>
          <rect x="560" y="190" width="160" height="50" rx="4" fill="#F5F2EB"/>
          <text x="640" y="210" font-family="JetBrains Mono, monospace" font-size="11" fill="#0A0908" font-weight="500" text-anchor="middle">design schema</text>
          <text x="640" y="227" font-family="Geist, sans-serif" font-size="10" fill="#3A3731" font-style="italic" text-anchor="middle">Claude Opus</text>
          <line x1="725" y1="215" x2="930" y2="215" stroke="#3A3731" stroke-width="1" stroke-dasharray="2 3"/>

          <!-- Track 2: developer -->
          <text x="555" y="280" font-family="JetBrains Mono, monospace" font-size="10" fill="#A09A8E" letter-spacing="1.5">AGENT · developer.1</text>
          <rect x="560" y="290" width="160" height="50" rx="4" fill="#F5F2EB"/>
          <text x="640" y="310" font-family="JetBrains Mono, monospace" font-size="11" fill="#0A0908" font-weight="500" text-anchor="middle">write routes</text>
          <text x="640" y="327" font-family="Geist, sans-serif" font-size="10" fill="#3A3731" font-style="italic" text-anchor="middle">GPT-5.4 · bash · file</text>
          <line x1="725" y1="315" x2="930" y2="315" stroke="#3A3731" stroke-width="1" stroke-dasharray="2 3"/>

          <!-- Track 3: developer 2 -->
          <text x="555" y="380" font-family="JetBrains Mono, monospace" font-size="10" fill="#A09A8E" letter-spacing="1.5">AGENT · developer.2</text>
          <rect x="560" y="390" width="160" height="50" rx="4" fill="#F5F2EB"/>
          <text x="640" y="410" font-family="JetBrains Mono, monospace" font-size="11" fill="#0A0908" font-weight="500" text-anchor="middle">write tests</text>
          <text x="640" y="427" font-family="Geist, sans-serif" font-size="10" fill="#3A3731" font-style="italic" text-anchor="middle">Gemma 4 · bash · grep</text>
          <line x1="725" y1="415" x2="930" y2="415" stroke="#3A3731" stroke-width="1" stroke-dasharray="2 3"/>

          <!-- Track 4: reviewer -->
          <text x="555" y="480" font-family="JetBrains Mono, monospace" font-size="10" fill="#A09A8E" letter-spacing="1.5">AGENT · reviewer</text>
          <rect x="780" y="490" width="160" height="50" rx="4" fill="#F5F2EB"/>
          <text x="860" y="510" font-family="JetBrains Mono, monospace" font-size="11" fill="#0A0908" font-weight="500" text-anchor="middle">review + sign-off</text>
          <text x="860" y="527" font-family="Geist, sans-serif" font-size="10" fill="#3A3731" font-style="italic" text-anchor="middle">Claude · waits for upstream</text>
          <line x1="540" y1="515" x2="775" y2="515" stroke="#3A3731" stroke-width="1" stroke-dasharray="2 3"/>

          <!-- MessageBus: horizontal band cutting across all tracks -->
          <rect x="540" y="570" width="400" height="40" rx="4" fill="none" stroke="#10B981" stroke-width="1" stroke-dasharray="6 4" opacity="0.7"/>
          <text x="740" y="595" font-family="JetBrains Mono, monospace" font-size="11" fill="#10B981" letter-spacing="1.5" text-anchor="middle">MESSAGE BUS — broadcast / fan-in</text>

          <!-- Arrows from each agent track to MessageBus -->
          <line x1="640" y1="240" x2="640" y2="570" stroke="#10B981" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.5"/>
          <line x1="640" y1="340" x2="640" y2="570" stroke="#10B981" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.5"/>
          <line x1="640" y1="440" x2="640" y2="570" stroke="#10B981" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.5"/>
          <line x1="860" y1="540" x2="860" y2="570" stroke="#10B981" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.5"/>

          <!-- Phase 3 → 4 join arrows -->
          <path d="M 940 215 L 970 215 L 970 350" fill="none" stroke="#A09A8E" stroke-width="1.5"/>
          <path d="M 940 315 L 970 315 L 970 350" fill="none" stroke="#A09A8E" stroke-width="1.5"/>
          <path d="M 940 415 L 970 415 L 970 350" fill="none" stroke="#A09A8E" stroke-width="1.5"/>
          <path d="M 940 515 L 970 515 L 970 350" fill="none" stroke="#A09A8E" stroke-width="1.5"/>
          <line x1="970" y1="350" x2="1020" y2="350" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrFlowAcc)"/>

          <!-- ====== PHASE 4: RESULT OUT ====== -->
          <rect x="1020" y="290" width="200" height="120" rx="6" fill="#0A0908" stroke="#10B981" stroke-width="1.5"/>
          <text x="1120" y="320" font-family="JetBrains Mono, monospace" font-size="11" fill="#10B981" letter-spacing="2" text-anchor="middle">RESULT</text>
          <text x="1120" y="350" font-family="JetBrains Mono, monospace" font-size="14" fill="#F5F2EB" font-weight="500" text-anchor="middle">{</text>
          <text x="1120" y="370" font-family="JetBrains Mono, monospace" font-size="11" fill="#A09A8E" text-anchor="middle">  success, tasks, agentResults</text>
          <text x="1120" y="385" font-family="JetBrains Mono, monospace" font-size="11" fill="#A09A8E" text-anchor="middle">  totalTokenUsage</text>
          <text x="1120" y="400" font-family="JetBrains Mono, monospace" font-size="14" fill="#F5F2EB" font-weight="500" text-anchor="middle">}</text>

          <!-- Footer signature -->
          <line x1="60" y1="660" x2="1220" y2="660" stroke="#1F1D1A" stroke-width="1"/>
          <text x="60" y="688" font-family="JetBrains Mono, monospace" font-size="11" fill="#726C62" letter-spacing="2">OPEN-MULTI-AGENT · runTeam() FLOW</text>
          <text x="1220" y="688" font-family="JetBrains Mono, monospace" font-size="11" fill="#10B981" letter-spacing="2" text-anchor="end">v1.8.0</text>

        </svg>
